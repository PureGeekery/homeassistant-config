set_ecobee_dte:
  name: Set Ecobee Thermostat with DTE settings.
  description: Sets the Ecobee Operation Mode with Peak Billing
  fields:
    thermostat:
      description: The thermostat to set.
      example: climate.ecobee_thermostat
    weather:
      description: The ecobee weather entitiy to use for getting the high temperature
      example: weather.ecobee_thermostat

set_ecobee:
  name: Set Ecobee Thermostat
  description: Sets the Ecobee Operation Mode.
  fields:
    thermostat:
      description: The thermostat to set.
      example: climate.ecobee_thermostat
    weather:
      description: The ecobee weather entitiy to use for getting the high temperature
      example: weather.ecobee_thermostat

set_fr_thermostat:
  name: Set Family Room Thermostat
  description: Sets the Family Room temperature, based off the main thermostat.
  fields:
    main_thermostat:
      description: The thermostat that will set reference temperature.
      example: climate.ecobee_thermostat
    fr_thermostat:
      description: The thermostat to be set.
      example: climate.family_room_thermostat

set_light_brightness_group:
  name: Set Light Brightness Group
  description: Sets the brightness of a group of lights, based off the brightness of a parent light.
  fields:
    parent_light:
      description: The light that will set reference brightness.
      example: light.living_room_wall_dimmer
    child_light:
      description: The light to be set.
      example: light.living_room_lamp
