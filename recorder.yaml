    - sensor.allergy_index_tomorrow # IQVIA
    - sensor.garage_door_dist # OpenGarage
    - sensor.grocy_chores # Grocy
    - sensor.last_boot # System Monitor
    - sensor.oven_oven_completion_time # SmartThings